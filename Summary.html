/* ————— sequence diagram engine ————— */
const Seq = ({ actors, steps }) => {
  const colW = Math.max(96, Math.min(150, Math.floor(880 / actors.length)));
  const W = actors.length * colW;
  const rowH = 30, top = 58;
  const H = top + steps.length * rowH + 14;
  const cx = (i) => i * colW + colW / 2;
  return (
    <div className="overflow-x-auto">
      <svg width={W} height={H} viewBox={`0 0 ${W} ${H}`} style={{ minWidth: Math.min(W, 880) }}>
        <Defs mid="ms" />
        {actors.map((a, i) => (
          <g key={i}>
            <rect x={i * colW + 8} y={6} width={colW - 16} height={30} rx="7" fill={C.navy} />
            <text x={cx(i)} y={25} textAnchor="middle" fontSize="10.5" fontWeight="700" fill="#fff" style={disp}>{a}</text>
            <line x1={cx(i)} y1={40} x2={cx(i)} y2={H - 6} stroke={C.line} strokeDasharray="3 4" />
          </g>
        ))}
        {steps.map((s, k) => {
          const y = top + k * rowH;
          if (s.note) return (
            <g key={k}>
              <rect x={10} y={y - 12} width={W - 20} height={22} rx="6"
                fill={s.tone === "accent" ? C.accentSoft : "#EDF2F7"} stroke={s.tone === "accent" ? C.accent : C.line} />
              <text x={W / 2} y={y + 3} textAnchor="middle" fontSize="9.7" fontStyle="italic"
                fill={s.tone === "accent" ? C.warn : C.sub} style={disp}>{s.note}</text>
            </g>
          );
          const x1 = cx(s.f), x2 = cx(s.t);
          const dir = x2 > x1 ? 1 : -1;
          return (
            <g key={k}>
              <path d={`M${x1} ${y} L${x2 - 4 * dir} ${y}`} fill="none"
                stroke={s.tone === "accent" ? C.accent : s.dashed ? C.sub : C.navy}
                strokeWidth="1.4" strokeDasharray={s.dashed ? "5 3" : "0"} markerEnd="url(#ms)" />
              <text x={(x1 + x2) / 2} y={y - 6} textAnchor="middle" fontSize="9.7"
                fontWeight={s.tone === "accent" ? 700 : 500}
                fill={s.tone === "accent" ? C.warn : C.ink} style={disp}>{s.label}</text>
            </g>
          );
        })}
      </svg>
      <div className="mt-1 text-[11px]" style={{ color: C.sub }}>solid = sync · dashed = async / return · orange = user-visible moment</div>
    </div>
  );
};

  "eventPattern":{"detail-type":["wallet.underfunded"]},
  "typeId":"wallet.underfunded",
  "fieldMap":{"payload.walletId":"$.detail.walletId",
              "entityRef":"'wallet#'+$.detail.walletId",
              "eventTime":"$.detail.occurredAt"},          // powers the episode guard (A15)
  "recipientSpec":[{"kind":"role","role":"finance-admin","orgId":"$.detail.orgId"},
                   {"kind":"slackChannel","ref":"#treasury-alerts"}],
  "status":"shadow" }

// the IMPLICIT resolver — fix event → resolve, zero producer code (A14 primary)
{ "action":"resolve",
  "eventPattern":{"detail-type":["wallet.funds_added"]},
  "typeId":"wallet.underfunded",
  "fieldMap":{"entityRef":"'wallet#'+$.detail.walletId",
              "eventTime":"$.detail.occurredAt"},
  "status":"active" }`}</Code>
          <div className="text-xs font-bold uppercase" style={{ color: C.navy }}>In-app — one AppSync GraphQL API (replaces REST + WS + registry)</div>
          <Code>{`type Query {
  inbox(cursor: String, limit: Int = 25): InboxPage!   # visibility-filtered
  unreadCount: Int!
}
type Mutation {
  markRead(notifId: ID!): InboxItem!       # applies dismissOnRead
  dismiss(notifId: ID!): InboxItem!
  resolve(notifId: ID!): ResolveResult!    # backup: sweeps the WHOLE group
  readAll: Int!
  publishInboxEvent(userId: ID!, event: InboxEventInput!): InboxEvent! @aws_iam
}
type Subscription {
  onInboxEvent(userId: ID!): InboxEvent    # UPSERT | REMOVE | BADGE
    @aws_subscribe(mutations: ["publishInboxEvent"])
}
# reads/mutations = direct JS resolvers to DynamoDB — no Lambda on the read path
# auth = platform OIDC JWT; keys built server-side; subscription pinned to own userId`}</Code>
          <div className="text-xs font-bold uppercase" style={{ color: C.navy }}>Admin — types, templates, mappings, budgets, triage</div>
          <Code>{`CRUD /v1/admin/types /templates /mappings /org-overrides
CRUD /v1/admin/tenants/{id}/ai-budget   // A13: same config store as types
CRUD /v1/admin/ai-triage                // topics[], mode T1–T4, thresholds, budget
POST /v1/admin/dlq/{queue}/redrive      // one-click, idempotent-safe — also the
                                        // path that delivers a DLQ'd AI message

{ "tenantId":"org_912", "monthlyTokenCap": 25000000,
  "perType": {"wallet.underfunded": 2000000}, "onExhaust": "park+alert" }`}</Code>
          <div className="text-xs font-bold uppercase" style={{ color: C.navy }}>Admin — webhook endpoints (two rotatable credentials)</div>
          <Code>{`CRUD /v1/admin/webhooks                     // url, subscribedTypes[], headers
                                            // HMAC secret + Bearer token auto-generated, shown once
POST /v1/admin/webhooks/{id}/verify         // (re)send the signed verification challenge
POST /v1/admin/webhooks/{id}/rotate-secret  // HMAC — dual-sign overlap window (coordination-free)
POST /v1/admin/webhooks/{id}/rotate-token   // Bearer — make-before-break  { "overlapHours": 48 }
GET  /v1/admin/webhooks/{id}/credentials    // masked current+previous of BOTH · *RotatedAt · expiry
POST /v1/admin/webhooks/{id}/enable         // clear the breaker after a fix

// device + consent (push / SMS) + SMS spend cap
registerDevice / unregisterDevice / setSmsConsent   // AppSync mutations (tenant#user from JWT)
CRUD /v1/admin/tenants/{id}/sms-budget              // per-tenant SMS spend/rate cap`}</Code>
        </Section>

        <Section id="data" title="Data model — the load-bearing keys">
          <Table head={["Entity", "What matters"]} rows={entities} />
          <div className="rounded-lg p-3" style={{ border: `1px solid ${C.line}` }}>
            <div className="text-xs font-bold uppercase" style={{ color: C.navy }}>PII — where stored & when evicted</div>
            <Table head={["Where", "Stored as", "Evicted"]} tight rows={[
              ["Payload store (DDB, CMK)", "Full payload encrypted; messages carry opaque payloadRef only", "expiresAt = retentionDays (type config) — permanent after that"],
              ["InboxItem body", "Rendered text may contain PII; tenant CMK encrypted", "Same expiresAt; also on resolve"],
              ["Enrichment cache", "Masked placeholder form only — zero raw PII", "Per-type cache TTL"],
              ["Audit trail (S3)", "Recipients as HMAC token; no payload; no body text", "S3 lifecycle = retentionDays; Object Lock optional"],
              ["Queues · logs · traces", "NEVER — CloudWatch data-protection policy enforces this", "N/A"],
              ["LLM prompt/response", "Allow-listed masked fields; output never stored; Bedrock no-retention", "Immediate — hash + token counts in audit only"],
            ]} />
          </div>
          <div className="text-sm" style={{ color: C.sub }}>
            Inbox <span style={mono}>PK = tenant#user</span> makes the read path one Query and makes IAM-level isolation possible;
            the <span style={mono}>groupKey</span> GSI makes group resolution one query + batched updates; <span style={mono}>episode + resolvedAt</span> make
            stale-trigger dedup a key comparison, not a distributed-systems project.
          </div>
        </Section>

        <Section id="ai" title="AI — the gate & event triage" kicker="wait semantics · retry ladder · Bedrock anti-clog · rule authoring">
          <Callout title="v1.4 requirement: the message WAITS in the AI pipeline — it is never sent to the client before enrichment.">
            AI-type messages are published <span style={mono}>stage=enrich</span>; only the enrich queue subscribes to that stage, so the wait is
            enforced by topology, not by discipline. On success the Enricher republishes <span style={mono}>stage=deliver</span> with the enriched
            fields and the channel λs render <b>one version</b> — identical in the inbox and the email. The v1.3 progressive machinery
            (contentVersion v1/v2, email hold window, upgrade window) is deleted.
          </Callout>
          <Fig src="f3_enrichment" cap="the AI gate — wait, gates, classified backoff retries, DLQ + mandatory alarm, republish stage=deliver" />
          <div className="text-xs font-bold uppercase" style={{ color: C.navy }}>Gate order (per message)</div>
          <div className="text-sm">
            signature cache → <b>TenantAiBudget check (before invoke)</b> → context fetch (payloadRef + allow-listed views, ≤ 150 ms, breaker) →
            PII masking → Bedrock (Haiku-class, temp 0, no retention, 5 s/attempt) → JSON-schema + groundedness validation
            (every number/date/entity ∈ payload ∪ context) → republish <span style={mono}>stage=deliver</span>.
          </div>
          <div className="text-xs font-bold uppercase" style={{ color: C.navy }}>Failure handling — classify first, then act</div>
          <Table head={["Failure class", "Response", "Burns budget?"]} tight rows={gateFailures} />
          <div className="text-sm">
            Retries ride SQS visibility-timeout backoff with jitter; <span style={mono}>maxReceiveCount = 5</span>, then the message lands in the
            <b> enrich-DLQ which alarms at depth ≥ 1 — the mandatory alert</b>. The audit trail carries
            <span style={mono}> enrich_waiting → enrich_retry{"{reason,attempt}"} → enrich_dlq{"{reason}"}</span> so “why is it stuck” is one query,
            and a <b>one-click redrive</b> (idempotent on notifId) is what finally delivers once the cause is fixed.
          </div>
          <div className="text-xs font-bold uppercase" style={{ color: C.navy }}>How Bedrock is protected from clogging — six independent brakes</div>
          <div className="space-y-2">
            {antiClog.map((o, i) => (
              <div key={i} className="rounded-lg p-3" style={{ border: `1px solid ${C.line}` }}>
                <div className="text-sm font-extrabold" style={{ color: C.navy }}>{i + 1}. {o.t}</div>
                <div className="mt-1 text-sm">{o.d}</div>
              </div>
            ))}
          </div>
          <div className="rounded-lg p-3" style={{ background: C.wash }}>
            <div className="text-xs font-bold uppercase" style={{ color: C.navy }}>What the model sees — context is pulled from the DB</div>
            <div className="mt-1 text-sm">
              The event alone is too thin to beat the template, so the Enricher assembles its input <b>from the store at enrichment time</b>:
              always the full payload item fetched by <span style={mono}>payloadRef</span> (messages only carried a reference), plus optional
              <b> allow-listed context views</b> declared per type in <span style={mono}>aiEnrichment.contextFetch</span> — e.g.
              <span style={mono}> wallet_context(walletId) → balance, currency, lastTopUps</span>. That's how the model can write
              "shortfall $12,400 — third top-up gap this month" instead of restating the event.
            </div>
            <div className="mt-1 text-xs" style={{ color: C.sub }}>
              Bounded: ≤ 2 fetches, ≤ 150 ms combined, circuit-broken. Fetched fields pass the same PII allow-list + masking;
              groundedness verifies outputs against <b>payload ∪ fetched context</b> — pulled data widens what the model may say and exactly what the checker can verify.
            </div>
          </div>
          <div className="pt-1 text-xs font-bold uppercase" style={{ color: C.navy }}>Event triage — 4 budget-friendly options (the AI authors rules, not messages)</div>
          <div className="text-sm" style={{ color: C.sub }}>
            AI inspects a <b>configured set of topics</b> and decides notify-or-not, audience, channels. At 5–14M events/day a model per event is unaffordable —
            so every option below has the LLM emit a <b>BusMapping</b> that the cheap deterministic machinery executes. Constrained to existing type/role/channel
            vocabulary, shadow-mode by default, origin-tagged, kill switch, platform AiTriageBudget.
          </div>
          <div className="space-y-2">
            {triageOpts.map((o) => (
              <div key={o.n} className="rounded-lg p-3" style={{ border: `1px solid ${o.rec ? C.accent : C.line}`, background: o.rec ? C.accentSoft : C.card }}>
                <div className="flex flex-wrap items-center gap-2">
                  <span className="text-sm font-extrabold" style={{ color: C.navy }}>{o.n} · {o.t}</span>
                  <Tag tone={o.rec ? "accent" : "navy"}>{o.cost}</Tag>
                  {o.rec && <Tag tone="ok">ship now</Tag>}
                </div>
                <div className="mt-1 text-sm">{o.how}</div>
                <div className="mt-1 text-xs" style={{ color: C.warn }}><b>Volume / storm shield:</b> {o.storm}</div>
                <div className="mt-1 text-xs" style={{ color: C.sub }}><b>Watch out:</b> {o.con}</div>
              </div>
            ))}
          </div>
          <Callout title="Triage recommendation">
            T1 + T2 together now — both write rules into the existing shadow-mode mapping machinery, inheriting every safeguard already built,
            for ~$1–30/mo. T4 is the evolution when product wants true real-time triage of never-seen events; T3 fits best as an anomaly-review feed.
            Every protection layer from enrichment — PII allow-list + masking, no-retention region-pinned Bedrock, budget-before-invoke, full audit —
            applies to auto-detect <b>by construction</b>, because triage runs through the same pipeline. Open governance items → R11.
          </Callout>
        </Section>

        <Section id="audit" title="Audit — how the requirement is fulfilled" kicker="coverage · trust model · PII · retention">
          <div className="text-sm">
            The contract: an <b>immutable, queryable record of every notification's journey</b>, PII never in logs, retention that follows configuration.
          </div>
          <Table head={["Recorded", "Details"]} rows={[
            ["Delivery lifecycle", "accepted (incl. duplicate acks) · routed (fan-out size, wave index) · rendered{templateVersion} · per-channel delivered/failed + full SES event stream · suppressed:already-resolved (episode guard) · expired · resolved{principal, path: implicit|api|inbox, episode}"],
            ["AI gate (v1.4)", "enrich_waiting → cache_hit | budget_denied | context_fetched{views} | invoked{model, tokens} | validated | enrich_retry{reason, attempt} | enrich_dlq{reason} | redriven — prompts/outputs NEVER stored, hash + token counts only"],
            ["AI triage", "shape_seen · rule_authored{origin:ai-triage} · shadow diffs · promoted{principal} · killed · unclassified — every model-written rule attributable and reversible"],
            ["Config & ops", "every type/template/mapping/override/budget change (versioned, principal) · DLQ redrives · manual re-renders"],
          ]} />
          <div className="grid gap-2 sm:grid-cols-2">
            <div className="rounded-lg p-3" style={{ background: C.wash }}>
              <div className="text-xs font-bold uppercase" style={{ color: C.navy }}>Why it can be trusted</div>
              <div className="mt-1 text-sm">Two planes: <b>authoritative state</b> (DeliveryRecord / InboxItem / ResolutionGroup + 7-day hot index)
                written in the same step as the side-effect — "what happened to X?" cannot lag; and the <b>analytical trail</b> —
                idempotent <span style={mono}>auditId = notifId#stage#attempt</span> → Firehose → S3 Parquet.
                Completeness is <b>verified daily</b>: reconciliation diffs record counts vs trail counts (alarm &gt; 0.1%), and audit-emit
                failures alarm on any sustained value — the trail fails loud, never silent.</div>
            </div>
            <div className="rounded-lg p-3" style={{ background: C.wash }}>
              <div className="text-xs font-bold uppercase" style={{ color: C.navy }}>PII · retention · immutability</div>
              <div className="mt-1 text-sm">Audit schema has <b>no payload field</b> (type-enforced + CloudWatch data-protection backstop);
                recipients as userId / HMAC token. <b>Retention = the config value</b>: retentionDays per type drives the S3 lifecycle on that
                type's prefix — one knob, no second place to update. Regulated tenants flip on S3 Versioning + <b>Object Lock (compliance)</b>
                for WORM — an IaC flag, not a redesign. Hot index self-expires at 7 days.</div>
            </div>
          </div>
        </Section>

        <Section id="dr" title="Disaster recovery — 3 options">
          <Table head={["Option", "RPO / RTO", "Cost", "Watch out"]} rows={drOptions} tight />
          <div className="text-sm" style={{ color: C.sub }}>
            Choose 1 now and pre-build its escape hatch (state export + bus-archive replay — cheap, and useful for ops anyway). Producer retries + replay make the <i>effective</i> notification RPO ≈ 0 even in option 1.
          </div>
        </Section>

        <Section id="fail" title="What breaks first — and what happens">
          <Table head={["Failure", "Designed response"]} rows={failures} />
          <div className="text-sm" style={{ color: C.sub }}>
            One golden dashboard: ingest vs baseline · per-queue oldest-message-age · per-channel p99 · <b>all DLQ depths (0)</b> · enrich retry/DLQ rate
            + budget burn · AppSync publish errors · SES event outcomes · suppressed-as-dup rate · top-10 tenants. Every alarm links a runbook;
            every runbook ends in a replay or redrive that idempotency makes safe.
          </div>
        </Section>

        <Section id="adr" title="ADRs, condensed">
          <div className="rounded-lg p-3" style={{ border: `1px solid ${C.line}` }}>
            <div className="text-sm font-extrabold" style={{ color: C.navy }}>ADR-1 · SNS attribute routing + queue-per-channel, no orchestrator and no router λ</div>
            <div className="mt-1 text-sm">channels[] from type config become message attributes; SQS filter policies route. Rejected: Step Functions (≈$2.9k/day at volume + all-channel coupling), a Router λ (its routing half is pure configuration — SNS does it for free; its resolution half belongs at intake), one shared queue (head-of-line + one DLQ kills isolation). Cost: end-to-end state is derived from traces + audit — accepted, mitigated by the status API.</div>
          </div>
          <div className="rounded-lg p-3" style={{ border: `1px solid ${C.line}` }}>
            <div className="text-sm font-extrabold" style={{ color: C.navy }}>ADR-2 · Pooled tenancy with IAM-enforced keys; silo cells for enterprise</div>
            <div className="mt-1 text-sm">Rejected: app-level WHERE-clause isolation (one bug = leak, indefensible for payroll), silo-for-all (cost × N + drift), table-per-tenant (limits, no blast-radius win). Cost: a tenant→cell routing layer and per-cell floor for enterprise — priced into that tier.</div>
          </div>
          <div className="rounded-lg p-3" style={{ border: `1px solid ${C.line}` }}>
            <div className="text-sm font-extrabold" style={{ color: C.navy }}>ADR-3 · AI-gated delivery (v1.4)</div>
            <div className="mt-1 text-sm">Requirement: the client must never see a pre-enrichment version. Decision: gate by SNS stage attribute — AI messages wait in enrich-q until the Enricher republishes them. Rejected: progressive enhancement (violates the requirement), synchronous enrichment inside intake (couples the producer API to model health). Cost: AI types carry a p99 ≤ 10 s SLO and a model outage delays them — bounded by retry/DLQ/alert and the anti-clog brakes (R12).</div>
          </div>
          <div className="rounded-lg p-3" style={{ border: `1px solid ${C.line}` }}>
            <div className="text-sm font-extrabold" style={{ color: C.navy }}>ADR-4 · AppSync as the entire in-app surface (v1.4)</div>
            <div className="mt-1 text-sm">One GraphQL API for queries, mutations and subscriptions; direct JS resolvers to DynamoDB (no Lambda on reads); AWS owns connections. Rejected: API GW WebSocket + registry + REST trio (three components, reconnect-storm quota risk R8, connection state to operate). Cost: GraphQL schema versioning discipline and AppSync-specific auth rules — cheap next to what it deletes.</div>
          </div>
        </Section>

        <Section id="appendix" title="Appendix — scale-up evolution (Kafka + EKS)" kicker="not an alternative today; the documented path if volume grows 4–6×">
          <div className="text-sm">
            Same logical components on a streaming substrate: <b>MSK</b> (RF = 3, <span style={mono}>acks=all</span>) as the backbone with topics per stage,
            long-running consumers on <b>EKS</b> (KEDA on lag, Graviton + Spot), <b>Aurora</b> for state (day-partitioned inbox, TTL = <span style={mono}>DROP PARTITION</span>),
            Redis for caches/counters, Glue Schema Registry for contract enforcement. Same envelope, same channel contracts, same AppSync front —
            the swap happens <b>behind</b> the intake and channel λ contracts, so producers and clients never notice.
          </div>
          <Table head={["What it buys", "What it costs"]} tight rows={[
            ["Native 7-day replay — reprocessing is an offset reset, not a project", "≈ $3k/mo broker + DB + cluster floor that never sleeps"],
            ["Contractual per-recipient ordering (partition keying)", "≈ 0.5–1 FTE of platform operations (brokers, partitions, K8s)"],
            ["Sub-linear cost at high volume (crossover ≈ 4–6×)", "Months instead of weeks to production; cluster-per-cell enterprise story"],
          ]} />
          <Callout title="Revisit triggers — any one fires the re-evaluation">
            (1) sustained volume &gt; ~60k notifications/min · (2) replay becomes a compliance / product feature ·
            (3) contractual per-recipient ordering. Until then, the serverless design meets every NFR with headroom and every saved dollar and hour compounds.
          </Callout>
        </Section>

        <Section id="risk" title="Ranked risks & open questions" kicker="✦ = closed by decision · R8 closed by AppSync · R12 new with the AI gate">
          <div className="space-y-2">
            {risksX.map((r) => (
              <div key={r.n} className="rounded-lg p-3" style={{ background: C.card, border: `1px solid ${r.st.startsWith("✦") ? C.accent : C.line}` }}>
                <div className="flex flex-wrap items-center gap-2">
                  <span className="h-2.5 w-2.5 shrink-0 rounded-full"
                    style={{ background: r.sev === "High" ? C.accent : r.sev === "Med" ? "#D9A441" : C.line }} />
                  <span className="text-sm font-extrabold" style={{ color: C.navy }}>R{r.n} · {r.t}</span>
                  <span className="text-xs font-bold" style={{ color: C.sub }}>{r.sev}</span>
                  <Tag tone={r.st.startsWith("✦") ? "accent" : "navy"}>{r.st}</Tag>
                </div>
                <div className="mt-1.5 text-sm"><b style={{ color: C.navySoft }}>What & why: </b>{r.what}</div>
                <div className="mt-1 text-sm"><b style={{ color: C.navySoft }}>Decision / mitigation: </b>{r.dec}</div>
              </div>
            ))}
          </div>
          <div className="text-sm" style={{ color: C.sub }}>
            Still on the design-review table: R2 (RBAC window sign-off), R6 (bus schema contract — covering resolve-mappings too),
            R11's promotion ownership, and the A15 residuals (eventTime producer contract + quiet-period defaults).
          </div>
        </Section>

        <footer className="pt-2 text-center text-xs" style={{ color: C.sub }}>
          Companion to docs/CNS-System-Design-v1.4.md — the authoritative design. The v1.3 DOCX (two-alternatives study, iteration logs, cost tables) is kept for history.
        </footer>
      </main>
    </div>
  );
}

    // 2. Render the application to the screen
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
